name: Release
run-name: Release ${{ inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v3.6)"
        required: true
        type: string

jobs:
  checks:
    uses: ./.github/workflows/ci-checks.yml

  release:
    name: Create GitHub Release
    needs: checks
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Overlay src/ from tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          git checkout ${{ inputs.tag }} -- src/

      - name: Pack extension
        run: bash scripts/build.sh

      - name: Extract changelog for this version
        id: changelog
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag#v}"
          notes=$(awk "/^## \[$version\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: build/add-username-toppanel@brendaw.com.zip
