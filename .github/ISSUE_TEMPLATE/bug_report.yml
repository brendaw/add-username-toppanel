name: Bug Report
description: Report a problem with the extension
labels: [bug]
body:
  - type: dropdown
    id: gnome-version
    attributes:
      label: GNOME Shell version
      options: ["45", "46", "47", "48", "49", "50"]
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: "e.g. 3.6"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (optional)
      description: Output from `journalctl /usr/bin/gnome-shell -f` if applicable
      render: shell
